name: Bug 报告
description: 提交一个 bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰描述这个 bug 是什么
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何触发这个 bug？
      placeholder: |
        1. 打开应用
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Glean 版本
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS 版本
      placeholder: "14.5 (Apple Silicon / Intel)"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志
      description: 可选。终端日志、错误对话框截图等。
      render: shell
